<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Chapter Video Kiosk</title>
<style>
  :root {
    --debug-color: rgba(255, 0, 80, 0.85);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* Hide the mouse cursor everywhere in the kiosk. Universal `*` rule
     beats the user-agent stylesheet's `cursor: pointer` default on
     <button>, so no per-element override is needed. The existing
     `debug` config flag (which already enables hotspot outlines and
     the HUD) ALSO restores native cursors for testing without a
     touchscreen. */
  *, *::before, *::after { cursor: none; }
  body.debug,
  body.debug *,
  body.debug *::before,
  body.debug *::after { cursor: auto; }

  #stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }
  #video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: #000;
  }
  #hotspots {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .hotspot {
    position: absolute;
    background: transparent;
    border: 0;
    padding: 0;
    margin: 0;
    pointer-events: auto;
    -webkit-tap-highlight-color: transparent;
    outline: none;
  }
  .hotspot:focus { outline: none; }
  body.debug .hotspot {
    background: rgba(255, 0, 80, 0.18);
    border: 3px dashed var(--debug-color);
    color: var(--debug-color);
    font-weight: 600;
    font-size: 1.5vw;
    display: flex;
    align-items: center;
    justify-content: center;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
  }
  body.debug #hud {
    position: fixed;
    bottom: 16px;
    left: 16px;
    background: rgba(0,0,0,0.7);
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.5;
    pointer-events: none;
    font-variant-numeric: tabular-nums;
  }
  #hud { display: none; }
  body.debug #hud { display: block; }
  #error {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: #1b365d;
    padding: 5vw;
    font-size: 1.6vw;
    text-align: center;
    line-height: 1.6;
  }
  body.error #error { display: flex; }
</style>
</head>
<body>
  <div id="stage">
    <video id="video" playsinline muted></video>
    <div id="hotspots"></div>
  </div>
  <div id="hud"></div>
  <div id="error"></div>

<script src="config.js"></script>
<script>
(function () {
  const $ = (id) => document.getElementById(id);
  const video = $('video');
  const hotspotLayer = $('hotspots');
  const hud = $('hud');
  const errorEl = $('error');

  const showError = (msg) => {
    errorEl.textContent = msg;
    document.body.classList.add('error');
    console.error(msg);
  };

  const config = window.APP_CONFIG;
  if (!config) return showError('config.js did not set window.APP_CONFIG — check the file.');

  const designWidth = config.designWidth || 3840;
  const designHeight = config.designHeight || 2160;
  const debug = !!config.debug;
  if (debug) document.body.classList.add('debug');

  video.src = config.video;
  video.loop = config.loop !== false;
  video.muted = config.muted !== false;
  video.autoplay = true;
  video.playsInline = true;

  const buttons = Array.isArray(config.buttons) ? config.buttons : [];
  buttons.forEach((b, i) => {
    const el = document.createElement('button');
    el.className = 'hotspot';
    el.setAttribute('aria-label', b.label || ('Chapter ' + (i + 1)));
    if (debug) el.textContent = (b.label || ('#' + (i + 1))) + ' → ' + b.timestamp + 's';
    el.style.left   = (b.x      / designWidth  * 100) + '%';
    el.style.top    = (b.y      / designHeight * 100) + '%';
    el.style.width  = (b.width  / designWidth  * 100) + '%';
    el.style.height = (b.height / designHeight * 100) + '%';

    const handler = (ev) => {
      ev.preventDefault();
      try {
        video.currentTime = Number(b.timestamp) || 0;
        const p = video.play();
        if (p && p.catch) p.catch(() => {});
      } catch (_) {}
    };
    el.addEventListener('pointerdown', handler);

    hotspotLayer.appendChild(el);
  });

  const tryPlay = () => {
    const p = video.play();
    if (p && p.catch) p.catch(() => {
      // Browsers normally allow muted autoplay; if blocked, retry on first input.
      const retry = () => {
        video.play().catch(() => {});
        window.removeEventListener('pointerdown', retry);
        window.removeEventListener('keydown', retry);
      };
      window.addEventListener('pointerdown', retry, { once: true });
      window.addEventListener('keydown', retry, { once: true });
    });
  };
  video.addEventListener('loadedmetadata', tryPlay, { once: true });
  video.addEventListener('error', () => showError('Failed to load video: ' + config.video));

  if (debug) {
    const updateHud = () => {
      hud.innerHTML =
        'DEBUG MODE<br>' +
        'video: ' + (video.duration ? video.currentTime.toFixed(2) + 's / ' + video.duration.toFixed(2) + 's' : '—') + '<br>' +
        'design: ' + designWidth + '×' + designHeight + '<br>' +
        'viewport: ' + window.innerWidth + '×' + window.innerHeight + '<br>' +
        'hotspots: ' + buttons.length;
    };
    updateHud();
    setInterval(updateHud, 250);
  }

  document.addEventListener('contextmenu', (e) => e.preventDefault());
}());
</script>
</body>
</html>
