<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Victron Multi-Screen Kiosk</title>
<style>
  /* ===========================================================
     Design tokens — minimal set. No headings / pagination / controls
     in App 3, so no Museo Sans, no button colours, no padding tokens.
     =========================================================== */
  :root {
    --black:           #000000;
    --primary-600:     #005fbe;  /* used by the error overlay only */
    --white:           #ffffff;

    --transition-ms:   700ms;
    --ease:            cubic-bezier(0.22, 0.61, 0.36, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--black);
    color: var(--white);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    touch-action: none;
  }

  /* Hide the mouse cursor everywhere in the kiosk (same pattern as
     App 1 / App 2). Universal `*` rule beats the UA stylesheet's
     `cursor: pointer` on `<button>` so no per-element override is
     needed. `body.debug` (set by JS when `debug: true` in config.js)
     restores native cursors for testing without a touchscreen. */
  *, *::before, *::after { cursor: none; }
  body.debug,
  body.debug *,
  body.debug *::before,
  body.debug *::after { cursor: auto; }

  /* Hard guarantee: nothing is ever selectable, draggable, or context-menu-able */
  body, body * {
    -webkit-user-select: none !important;
    -moz-user-select:    none !important;
    -ms-user-select:     none !important;
    user-select:         none !important;
    -webkit-user-drag:   none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }
  img, video { -webkit-user-drag: none; user-drag: none; pointer-events: none; }

  #stage {
    position: fixed; inset: 0;
    overflow: hidden;
  }

  /* ===========================================================
     Slides — one full-stage container per slide, each holding a
     single media element (image OR video). Only one slide carries
     `.is-current` at a time; entry animation is opacity + slight
     scale, matching App 1 so the visual feel is consistent across
     all three apps.
     =========================================================== */
  #slides {
    position: absolute; inset: 0;
    z-index: 1;
  }
  .slide {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .slide-media {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;          /* fullscreen on every role */
    /* `<video>` UA-default is a black background that shows through
       letterbox bars when aspect doesn't match. Forcing transparent
       keeps the letterbox consistent with `<img>` (which is
       transparent by default). The behaviour matches App 1. */
    background: transparent;
    display: block;
    opacity: 0;
    transform: scale(1.02);
    transition:
      opacity var(--transition-ms) var(--ease),
      transform calc(var(--transition-ms) + 200ms) var(--ease);
    will-change: opacity, transform;
  }
  .slide.is-current .slide-media { opacity: 1; transform: scale(1); }

  /* ===========================================================
     Debug HUD — top-left, only visible when `debug: true`. Shows
     the role, WebSocket state, and the most-recent applied state
     so a developer can see the sync at a glance. Matches App 2's
     debug-HUD convention.
     =========================================================== */
  #hud { display: none; }
  body.debug #hud {
    display: block;
    position: fixed;
    top: 16px; left: 16px;
    background: rgba(0,0,0,0.7);
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.5;
    pointer-events: none;
    font-variant-numeric: tabular-nums;
    z-index: 99;
  }

  /* Error fallback */
  #error {
    position: fixed; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    background: var(--primary-600);
    padding: 5vw;
    font-size: 1.6vw;
    text-align: center; line-height: 1.6;
    color: var(--white);
    z-index: 9999;
  }
  body.error #error { display: flex; }
</style>
</head>
<body>
  <div id="stage">
    <div id="slides"></div>
  </div>

  <div id="hud"></div>
  <div id="error"></div>

<script src="config.js"></script>
<script>
(function () {
  const $ = (s) => document.querySelector(s);
  const slidesEl = $('#slides');
  const errorEl  = $('#error');
  const hud      = $('#hud');

  const showError = (msg) => {
    errorEl.textContent = msg;
    document.body.classList.add('error');
    console.error(msg);
  };

  const cfg = window.APP_CONFIG;
  if (!cfg) return showError('config.js did not set window.APP_CONFIG — check the file.');

  // ---- Role detection -----------------------------------------------------
  // ?role=center|left|right; default to center if missing. There are no
  // controls anymore — every role just renders its own slide source. The
  // `center` role is still distinguished because it (and only it) owns
  // the auto-advance timer and broadcasts state to the satellites via
  // the WS relay; without one authoritative ticker the three displays
  // would drift over time (different startup times + render jitter).
  const VALID_ROLES = new Set(['center', 'left', 'right']);
  const urlRole = new URLSearchParams(location.search).get('role');
  const role = VALID_ROLES.has(urlRole) ? urlRole : 'center';
  const isCenter = role === 'center';
  document.body.classList.add('role-' + role);

  // ---- Slides + config ----------------------------------------------------
  const slides = (cfg.slideshow && cfg.slideshow.images) || [];
  if (!slides.length) return showError('config.js: slideshow.images is empty');

  const ss = cfg.slideshow || {};
  // typeof===number so an explicit 0 is honoured (same trick as App 1):
  //   autoAdvanceMs: 0 → slide stays forever (never advances). With no
  //   controls in App 3, a slide configured this way will freeze the
  //   slideshow — useful only if all-but-one slides are 0 and the
  //   kiosk should hold on a single hero image / video. The default
  //   8000 keeps the show running.
  const transitionMs  = (typeof ss.transitionMs  === 'number') ? ss.transitionMs  : 700;
  const autoAdvanceMs = (typeof ss.autoAdvanceMs === 'number') ? ss.autoAdvanceMs : 8000;

  if (cfg.debug === true) document.body.classList.add('debug');

  // config.js is the single source of truth for wsUrl — no fallback
  // here, so the port lives in exactly one place. If an operator
  // accidentally deletes the field the on-screen error overlay tells
  // them what's wrong rather than silently connecting to the default.
  if (typeof cfg.wsUrl !== 'string' || !cfg.wsUrl) {
    return showError('config.js: missing or empty wsUrl (expected e.g. "ws://127.0.0.1:8743/ws")');
  }
  const wsUrl = cfg.wsUrl;

  document.documentElement.style.setProperty('--transition-ms', transitionMs + 'ms');

  // ---- Build per-role slide DOM ------------------------------------------
  // Each role only renders ITS source per slide (slide.left for role=left,
  // etc.). Saves DOM weight + per-video preload pressure on satellites.
  const VIDEO_EXT = /\.(mp4|webm|ogg|m4v|mov)(\?.*)?$/i;
  // The config field is `middle` (geographically) but the role is
  // `center` (legacy from when the center had controls). Map role →
  // config-field once so the rest of the code can ignore the
  // distinction.
  const ROLE_TO_FIELD = { center: 'middle', left: 'left', right: 'right' };
  const fieldName = ROLE_TO_FIELD[role];

  const slideContainers = [];
  const mediaEls        = [];

  slides.forEach((s, i) => {
    const src = s[fieldName];
    const slideEl = document.createElement('div');
    slideEl.className = 'slide';

    if (!src) {
      // No media for this role on this slide — leave the slide blank.
      // The placeholder container preserves indexing parity with the
      // center, so a "show slide N" message still resolves to the same
      // slide on every screen.
      slidesEl.appendChild(slideEl);
      slideContainers.push(slideEl);
      mediaEls.push(null);
      return;
    }

    const isVideo = VIDEO_EXT.test(src);
    let mediaEl;
    if (isVideo) {
      mediaEl = document.createElement('video');
      mediaEl.className = 'slide-media';
      mediaEl.src = src;
      mediaEl.muted = true;
      mediaEl.playsInline = true;
      // `loop` is per-slide (applies to all roles for that slide). Defaults to true.
      mediaEl.loop = s.loop !== false;
      mediaEl.preload = 'metadata';
      mediaEl.draggable = false;
      mediaEl.addEventListener('error',
        () => console.warn('[app3 ' + role + '] video failed to load:', src));
    } else {
      mediaEl = document.createElement('img');
      mediaEl.className = 'slide-media';
      mediaEl.src = src;
      mediaEl.alt = 'Slide ' + (i + 1) + ' (' + role + ')';
      mediaEl.draggable = false;
      // Center boots first; satellites usually catch up via cached relay
      // state. Eager-load slide 0 + lazy-load the rest for memory thrift.
      mediaEl.loading = i === 0 ? 'eager' : 'lazy';
      mediaEl.decoding = 'async';
    }
    slideEl.appendChild(mediaEl);
    slidesEl.appendChild(slideEl);
    slideContainers.push(slideEl);
    mediaEls.push(mediaEl);
  });

  // ---- Auto-advance (center only) ----------------------------------------
  // The countdown ring + per-frame requestAnimationFrame from App 1 is
  // gone — no UI to draw against, so a plain setTimeout to the next
  // boundary is enough. Re-armed every time the slide changes (whether
  // local-advance or incoming broadcast).
  let advanceTimer = null;
  const effectiveAutoAdvanceMs = (i) => {
    const s = slides[i];
    return (s && typeof s.autoAdvanceMs === 'number') ? s.autoAdvanceMs : autoAdvanceMs;
  };
  const scheduleNextAdvance = () => {
    if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
    if (!isCenter) return;            // only center auto-advances
    const ms = effectiveAutoAdvanceMs(current);
    if (ms <= 0) return;              // 0 = stay forever
    advanceTimer = setTimeout(() => nextSlide(), ms);
  };

  // ---- Slide rendering ---------------------------------------------------
  let current = 0;
  const renderSlide = (next) => {
    slideContainers.forEach((el, i) => {
      const isNew = (i === next);
      el.classList.toggle('is-current', isNew);
      const v = mediaEls[i];
      if (v && v.tagName === 'VIDEO') {
        if (isNew) {
          try { v.currentTime = 0; } catch (_) {}
          const p = v.play();
          if (p && p.catch) p.catch(() => {});
        } else {
          try { v.pause(); } catch (_) {}
        }
      }
    });
    updateHud();
  };

  // ---- State + sync ------------------------------------------------------
  // Center is authoritative: it owns `current` and broadcasts on every
  // change. Satellites apply incoming state and never originate state
  // changes. `lastAppliedTs` guards against any out-of-order delivery —
  // TCP preserves order so this is paranoia but cheap.
  let lastAppliedTs = 0;

  const applyState = (st) => {
    if (typeof st.ts === 'number' && st.ts <= lastAppliedTs) return;
    if (typeof st.ts === 'number') lastAppliedTs = st.ts;

    if (typeof st.index === 'number') {
      const n = ((st.index % slides.length) + slides.length) % slides.length;
      if (n !== current) {
        current = n;
        renderSlide(current);
      }
    }
  };

  const broadcastState = () => {
    if (!isCenter) return;
    send({ type: 'state', index: current, ts: Date.now() });
  };

  // Advance one slide on the center; rebroadcast + re-arm the timer.
  // On satellites this is only reachable via the broadcast handler
  // (which sets `current` and calls renderSlide directly), so the
  // `if (isCenter)` guards inside aren't really needed there — kept
  // for symmetry / future safety.
  const goTo = (i) => {
    const n = ((i % slides.length) + slides.length) % slides.length;
    if (n === current) return;
    current = n;
    renderSlide(current);
    if (isCenter) {
      broadcastState();
      scheduleNextAdvance();
    }
  };
  const nextSlide = () => goTo(current + 1);

  // ---- WebSocket client --------------------------------------------------
  // Auto-reconnect with backoff. The relay caches the last broadcast
  // message and replays it to new connects, so on (re)connect a
  // satellite immediately sees the current state.
  let ws = null;
  let wsReady = false;
  let wsRetryMs = 500;
  const WS_RETRY_MIN = 500;
  const WS_RETRY_MAX = 8000;
  const sendQueue = [];

  const send = (msg) => {
    const data = JSON.stringify(msg);
    if (wsReady && ws && ws.readyState === WebSocket.OPEN) {
      ws.send(data);
    } else {
      // Drop old state messages from the queue — the latest one supersedes.
      for (let i = sendQueue.length - 1; i >= 0; i--) {
        try {
          const m = JSON.parse(sendQueue[i]);
          if (m.type === 'state') sendQueue.splice(i, 1);
        } catch (_) { /* keep malformed entries — shouldn't happen */ }
      }
      sendQueue.push(data);
    }
  };

  const connectWS = () => {
    try {
      ws = new WebSocket(wsUrl);
    } catch (e) {
      console.warn('[app3 ' + role + '] WS construct failed:', e);
      scheduleReconnect();
      return;
    }
    ws.onopen = () => {
      wsReady = true;
      wsRetryMs = WS_RETRY_MIN;
      while (sendQueue.length) ws.send(sendQueue.shift());
      // Center always re-broadcasts on (re)connect so it overwrites
      // any stale cached state in the relay.
      if (isCenter) broadcastState();
      updateHud();
    };
    ws.onmessage = (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        if (msg && msg.type === 'state') {
          // Center ignores incoming state (only it broadcasts state).
          // Otherwise on reconnect it would mirror its own old cached
          // state from before a crash + lose any in-flight changes.
          if (!isCenter) applyState(msg);
        }
      } catch (_) { /* not JSON; ignore */ }
    };
    ws.onclose = () => {
      wsReady = false;
      ws = null;
      scheduleReconnect();
      updateHud();
    };
    ws.onerror = () => { /* onclose follows; reconnect there */ };
  };

  const scheduleReconnect = () => {
    setTimeout(connectWS, wsRetryMs);
    wsRetryMs = Math.min(wsRetryMs * 2, WS_RETRY_MAX);
  };

  // Block context menu / select / drag globally on every role.
  document.addEventListener('contextmenu', (e) => e.preventDefault());
  document.addEventListener('selectstart', (e) => e.preventDefault());
  document.addEventListener('dragstart',   (e) => e.preventDefault());

  // If the center's tab is backgrounded (rare in --kiosk, but possible
  // if an OS-level overlay grabs focus) the setTimeout fires late and
  // the satellites would drift. Re-arm the next advance from "now" on
  // visibility regain to keep the timing predictable.
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && isCenter) scheduleNextAdvance();
  });

  // ---- Debug HUD ---------------------------------------------------------
  const updateHud = () => {
    if (!cfg.debug) return;
    hud.innerHTML =
      '<b>app3 / ' + role + '</b><br>' +
      'slide: ' + (current + 1) + ' / ' + slides.length + '<br>' +
      'ws: ' + (wsReady ? 'connected' : 'disconnected') + '<br>' +
      'last ts: ' + (lastAppliedTs || '—');
  };

  // ---- Boot --------------------------------------------------------------
  // Render slide 0 immediately (no fonts to wait for now — text-free app).
  // Center starts the WS broadcast + auto-advance; satellites just wait
  // for incoming state. Both connect to WS on boot so the relay's
  // cached-last-message replay can kick in immediately.
  renderSlide(0);
  connectWS();
  if (isCenter) {
    broadcastState();
    scheduleNextAdvance();
  }
  updateHud();
}());
</script>
</body>
</html>
