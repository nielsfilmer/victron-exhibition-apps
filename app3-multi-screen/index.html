<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Victron Multi-Screen Kiosk</title>
<style>
  /* Self-hosted Museo Sans 700 — kiosk runs fully offline, no network calls */
  @font-face {
    font-family: "museo-sans";
    src: url("fonts/museosans-700.ttf") format("truetype");
    font-weight: 700;
    font-style: normal;
    font-display: block;
  }

  /* ===========================================================
     Design tokens — mirror App 1's tokens for visual consistency.
     vw-based so the layout scales linearly from 1080p to 4K.
     =========================================================== */
  :root {
    --black:            #000000;
    --primary-600:      #005fbe;
    --white:            #ffffff;
    --white-80:         rgba(255, 255, 255, 0.8);
    --btn-border:       rgba(0, 0, 0, 0.16);

    --font-headers:     "museo-sans", "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    --font-body:        "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;

    --pad-edge:         2.5vw;
    --btn-size:         5vw;
    --gap-controls:     1.667vw;

    --transition-ms:    700ms;
    --ease:             cubic-bezier(0.22, 0.61, 0.36, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--black);
    color: var(--white);
    font-family: var(--font-body);
    touch-action: none;
  }

  /* Hide the mouse cursor everywhere in the kiosk (same pattern as
     App 1 / App 2). Universal `*` rule beats the UA stylesheet's
     `cursor: pointer` on `<button>` so no per-element override is
     needed. `body.debug` (set by JS when `debug: true` in config.js)
     restores native cursors for testing without a touchscreen. */
  *, *::before, *::after { cursor: none; }
  body.debug,
  body.debug *,
  body.debug *::before,
  body.debug *::after { cursor: auto; }

  /* Hard guarantee: nothing is ever selectable, draggable, or context-menu-able */
  body, body * {
    -webkit-user-select: none !important;
    -moz-user-select:    none !important;
    -ms-user-select:     none !important;
    user-select:         none !important;
    -webkit-user-drag:   none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }
  img, video { -webkit-user-drag: none; user-drag: none; pointer-events: none; }

  #stage {
    position: fixed; inset: 0;
    overflow: hidden;
  }

  /* ===========================================================
     Slides — each slide is a full-stage container holding a single
     media element (image OR video). Only one slide carries
     `.is-current` at a time; entry animation is opacity + slight
     scale, matching App 1 so the visual feel is consistent across
     all three apps.
     =========================================================== */
  #slides {
    position: absolute; inset: 0;
    z-index: 1;
  }
  .slide {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .slide-media {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;          /* fullscreen on every role */
    /* `<video>` UA-default is a black background that shows through
       letterbox bars when aspect doesn't match. Forcing transparent
       keeps the letterbox consistent with `<img>` (which is
       transparent by default). The behaviour matches App 1. */
    background: transparent;
    display: block;
    opacity: 0;
    transform: scale(1.02);
    transition:
      opacity var(--transition-ms) var(--ease),
      transform calc(var(--transition-ms) + 200ms) var(--ease);
    will-change: opacity, transform;
  }
  .slide.is-current .slide-media { opacity: 1; transform: scale(1); }

  /* ===========================================================
     Controls cluster — center role only. Hidden on left/right via
     a body.role-* class set at boot from the ?role= URL param.
     Layout / colours / sizing copied verbatim from App 1 so the
     control surface is identical across the two apps that have it.
     =========================================================== */
  body:not(.role-center) #controls { display: none; }

  #controls {
    position: absolute;
    left: var(--pad-edge);
    right: auto;
    bottom: var(--pad-edge);
    display: flex;
    align-items: center;
    gap: var(--gap-controls);
    z-index: 3;
  }
  body.controls-right #controls {
    left: auto;
    right: var(--pad-edge);
  }

  .ctrl-btn {
    position: relative;
    width: var(--btn-size);
    height: var(--btn-size);
    border-radius: 100px;
    background: var(--primary-600);
    border: 1px solid var(--btn-border);
    color: var(--white);
    display: flex; align-items: center; justify-content: center;
    padding: 0;
    transition: transform 120ms var(--ease), filter 200ms var(--ease);
  }
  .ctrl-btn:active { transform: scale(0.95); filter: brightness(0.9); }
  .ctrl-btn > svg:not(#countdown-ring) { width: 41.67%; height: 41.67%; display: block; }

  #pagination {
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 1.458vw;
    line-height: 1.2;
    color: var(--white);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  #next-wrap { flex-shrink: 0; }

  /* Countdown ring lives inside the next button (same as App 1) so it
     inherits the `:active` scale and paints over the blue fill.
     `inset: -1px` covers the button's 1px border — without it, a 1px
     blue rim would show outside the white ring stroke. RING_R in JS
     MUST match <circle r=…> here, or the dasharray won't fully cover
     the path at fraction 0 and a small arc would be visible. */
  #countdown-ring {
    position: absolute;
    inset: -1px;
    pointer-events: none;
    transform: rotate(-90deg);
  }
  #countdown-ring .progress {
    fill: none;
    stroke: var(--white);
    stroke-width: 5;
    stroke-linecap: round;
  }

  /* ===========================================================
     Debug HUD — top-left, only visible when `debug: true`. Shows
     the role, WebSocket state, and the most-recent applied state
     so a developer can see the sync at a glance. Matches App 2's
     debug-HUD convention.
     =========================================================== */
  #hud { display: none; }
  body.debug #hud {
    display: block;
    position: fixed;
    top: 16px; left: 16px;
    background: rgba(0,0,0,0.7);
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.5;
    pointer-events: none;
    font-variant-numeric: tabular-nums;
    z-index: 99;
  }

  /* Error fallback */
  #error {
    position: fixed; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    background: var(--primary-600);
    padding: 5vw;
    font-family: var(--font-body);
    font-size: 1.6vw;
    text-align: center; line-height: 1.6;
    color: var(--white);
    z-index: 9999;
  }
  body.error #error { display: flex; }
</style>
</head>
<body>
  <div id="stage">
    <div id="slides"></div>

    <!-- Controls cluster — visible only on the center role -->
    <div id="controls">
      <button class="ctrl-btn" id="back-btn" aria-label="Previous slide">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="20" y1="12" x2="4" y2="12"/>
          <polyline points="11 19 4 12 11 5"/>
        </svg>
      </button>

      <div id="pagination" aria-live="polite">
        <span class="current">1</span> / <span class="total">1</span>
      </div>

      <div id="next-wrap">
        <button class="ctrl-btn" id="next-btn" aria-label="Next slide">
          <svg id="countdown-ring" viewBox="0 0 100 100" aria-hidden="true">
            <circle class="progress" cx="50" cy="50" r="47.5"/>
          </svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="12" x2="20" y2="12"/>
            <polyline points="13 5 20 12 13 19"/>
          </svg>
        </button>
      </div>

      <button class="ctrl-btn" id="pause-btn" aria-label="Pause auto-advance" aria-pressed="false">
        <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <rect x="6"  y="4" width="4" height="16" rx="1"/>
          <rect x="14" y="4" width="4" height="16" rx="1"/>
        </svg>
        <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" style="display:none">
          <polygon points="6,4 20,12 6,20"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="hud"></div>
  <div id="error"></div>

<script src="config.js"></script>
<script>
(function () {
  const $ = (s) => document.querySelector(s);
  const stage      = $('#stage');
  const slidesEl   = $('#slides');
  const backBtn    = $('#back-btn');
  const nextBtn    = $('#next-btn');
  const pauseBtn   = $('#pause-btn');
  const ringProg   = $('#countdown-ring .progress');
  const pageCur    = $('#pagination .current');
  const pageTot    = $('#pagination .total');
  const errorEl    = $('#error');
  const hud        = $('#hud');
  const iconPause  = pauseBtn.querySelector('.icon-pause');
  const iconPlay   = pauseBtn.querySelector('.icon-play');

  const showError = (msg) => {
    errorEl.textContent = msg;
    document.body.classList.add('error');
    console.error(msg);
  };

  const cfg = window.APP_CONFIG;
  if (!cfg) return showError('config.js did not set window.APP_CONFIG — check the file.');

  // ---- Role detection -----------------------------------------------------
  // ?role=center|left|right; default to center if missing. Center is the
  // only role with controls + swipe; satellites are passive receivers.
  const VALID_ROLES = new Set(['center', 'left', 'right']);
  const urlRole = new URLSearchParams(location.search).get('role');
  const role = VALID_ROLES.has(urlRole) ? urlRole : 'center';
  const isCenter = role === 'center';
  document.body.classList.add('role-' + role);

  // ---- Slides + config ----------------------------------------------------
  const slides = (cfg.slideshow && cfg.slideshow.images) || [];
  if (!slides.length) return showError('config.js: slideshow.images is empty');

  const ss = cfg.slideshow || {};
  // typeof===number so an explicit 0 is honoured (same trick as App 1):
  //   autoAdvanceMs: 0 → countdown disabled, slide stays until manual nav.
  const transitionMs  = (typeof ss.transitionMs  === 'number') ? ss.transitionMs  : 700;
  const autoAdvanceMs = (typeof ss.autoAdvanceMs === 'number') ? ss.autoAdvanceMs : 8000;
  const pauseMinutes  = cfg.pauseMinutes != null ? cfg.pauseMinutes : 5;
  const pauseMs       = Math.max(0, pauseMinutes) * 60 * 1000;

  const controlsAlign = cfg.controlsAlign === 'right' ? 'right' : 'left';
  if (controlsAlign === 'right') document.body.classList.add('controls-right');

  if (cfg.debug === true) document.body.classList.add('debug');

  // config.js is the single source of truth for wsUrl — no fallback
  // here, so the port lives in exactly one place. If an operator
  // accidentally deletes the field the on-screen error overlay tells
  // them what's wrong rather than silently connecting to the default.
  if (typeof cfg.wsUrl !== 'string' || !cfg.wsUrl) {
    return showError('config.js: missing or empty wsUrl (expected e.g. "ws://127.0.0.1:8743/ws")');
  }
  const wsUrl = cfg.wsUrl;

  document.documentElement.style.setProperty('--transition-ms', transitionMs + 'ms');

  // ---- Build per-role slide DOM ------------------------------------------
  // Each role only renders ITS source per slide (slide.left for role=left,
  // etc.). Saves DOM weight + per-video preload pressure on satellites.
  const VIDEO_EXT = /\.(mp4|webm|ogg|m4v|mov)(\?.*)?$/i;
  // The config field is `middle` (geographically) but the role is
  // `center` (UI-meaningful — it's the one with the controls). Map
  // role → config-field once so the rest of the code can ignore the
  // distinction.
  const ROLE_TO_FIELD = { center: 'middle', left: 'left', right: 'right' };
  const fieldName = ROLE_TO_FIELD[role];

  const slideContainers = [];
  const mediaEls        = [];

  slides.forEach((s, i) => {
    const src = s[fieldName];
    const slideEl = document.createElement('div');
    slideEl.className = 'slide';

    if (!src) {
      // No media for this role on this slide — leave the slide blank.
      // The placeholder container preserves indexing parity with the
      // center, so a "show slide N" message still resolves to the same
      // slide on every screen.
      slidesEl.appendChild(slideEl);
      slideContainers.push(slideEl);
      mediaEls.push(null);
      return;
    }

    const isVideo = VIDEO_EXT.test(src);
    let mediaEl;
    if (isVideo) {
      mediaEl = document.createElement('video');
      mediaEl.className = 'slide-media';
      mediaEl.src = src;
      mediaEl.muted = true;
      mediaEl.playsInline = true;
      // `loop` is per-slide (applies to all roles for that slide). Defaults to true.
      mediaEl.loop = s.loop !== false;
      mediaEl.preload = 'metadata';
      mediaEl.draggable = false;
      mediaEl.addEventListener('error',
        () => console.warn('[app3 ' + role + '] video failed to load:', src));
    } else {
      mediaEl = document.createElement('img');
      mediaEl.className = 'slide-media';
      mediaEl.src = src;
      mediaEl.alt = 'Slide ' + (i + 1) + ' (' + role + ')';
      mediaEl.draggable = false;
      // Center boots first; satellites usually catch up via cached relay
      // state. Eager-load slide 0 + lazy-load the rest for memory thrift.
      mediaEl.loading = i === 0 ? 'eager' : 'lazy';
      mediaEl.decoding = 'async';
    }
    slideEl.appendChild(mediaEl);
    slidesEl.appendChild(slideEl);
    slideContainers.push(slideEl);
    mediaEls.push(mediaEl);
  });

  pageTot.textContent = String(slides.length);

  // ---- Countdown ring (center only, but harmless on satellites) ----------
  // RING_R MUST match the SVG <circle r="…">. Mismatch → dasharray
  // doesn't cover path at f=0 and a small arc is visible. Same pitfall
  // as App 1 — see CLAUDE.md "Common pitfalls" #1.
  const RING_R = 47.5;
  const RING_C = 2 * Math.PI * RING_R;
  ringProg.style.strokeDasharray  = RING_C;
  ringProg.style.strokeDashoffset = RING_C;

  let countdownStart = 0;
  let countdownRAF   = null;
  let pauseResumeTimer = null;
  let isPaused = false;
  let currentMs = 0;

  const setRingProgress = (fraction) => {
    const f = Math.min(1, Math.max(0, fraction));
    ringProg.style.strokeDashoffset = String(RING_C * (1 - f));
  };
  const stopCountdown = () => {
    if (countdownRAF) { cancelAnimationFrame(countdownRAF); countdownRAF = null; }
  };
  const effectiveAutoAdvanceMs = (i) => {
    const s = slides[i];
    return (s && typeof s.autoAdvanceMs === 'number') ? s.autoAdvanceMs : autoAdvanceMs;
  };
  const startCountdown = () => {
    if (!isCenter) return;            // only center auto-advances
    stopCountdown();
    currentMs = effectiveAutoAdvanceMs(current);
    if (currentMs <= 0 || isPaused) return;
    countdownStart = performance.now();
    setRingProgress(0);
    const tick = (now) => {
      const elapsed = now - countdownStart;
      const f = elapsed / currentMs;
      setRingProgress(f);
      if (f < 1) {
        countdownRAF = requestAnimationFrame(tick);
      } else {
        countdownRAF = null;
        nextSlide();
      }
    };
    countdownRAF = requestAnimationFrame(tick);
  };

  // ---- Slide rendering ---------------------------------------------------
  let current = 0;
  const renderSlide = (next) => {
    slideContainers.forEach((el, i) => {
      const isNew = (i === next);
      el.classList.toggle('is-current', isNew);
      const v = mediaEls[i];
      if (v && v.tagName === 'VIDEO') {
        if (isNew) {
          try { v.currentTime = 0; } catch (_) {}
          // Don't autoplay videos while paused — they should freeze with
          // the rest of the slideshow.
          if (!isPaused) {
            const p = v.play();
            if (p && p.catch) p.catch(() => {});
          }
        } else {
          try { v.pause(); } catch (_) {}
        }
      }
    });
    pageCur.textContent = String(next + 1);
    updateHud();
  };

  // ---- State + sync ------------------------------------------------------
  // Center is authoritative: it owns `current` + `isPaused` and
  // broadcasts on every change. Satellites apply incoming state and
  // never originate state changes (their input listeners are no-ops).
  // `lastAppliedTs` guards against any out-of-order delivery — TCP
  // preserves order so this is paranoia but cheap.
  let lastAppliedTs = 0;

  const applyState = (st) => {
    if (typeof st.ts === 'number' && st.ts <= lastAppliedTs) return;
    if (typeof st.ts === 'number') lastAppliedTs = st.ts;

    // Apply `paused` BEFORE `index` so renderSlide()'s `if (!isPaused)`
    // video-play branch sees the right pause state on the first apply
    // after boot. Without this ordering, a satellite that connects
    // while the operator has the center paused would briefly play the
    // entering slide's video (one frame) before applyState's second
    // half pauses it — a visible flicker. setPaused() with broadcast=false
    // is cheap when the state already matches (idempotent UI update).
    if (typeof st.paused === 'boolean' && st.paused !== isPaused) {
      // applyState comes from the wire on satellites; on center, the
      // user toggled the button locally (and broadcastState was already
      // called). Either way, mirror the UI + video state.
      setPaused(st.paused, /*broadcast=*/false);
    }
    if (typeof st.index === 'number') {
      const n = ((st.index % slides.length) + slides.length) % slides.length;
      if (n !== current) {
        current = n;
        renderSlide(current);
      }
    }
  };

  const broadcastState = () => {
    if (!isCenter) return;
    send({ type: 'state', index: current, paused: isPaused, ts: Date.now() });
  };

  // Navigation. On center, these update local state and broadcast.
  // On satellites the button event listeners are not bound, so these
  // are only ever called as a side-effect of an incoming broadcast.
  const goTo = (i) => {
    const n = ((i % slides.length) + slides.length) % slides.length;
    if (n === current) return;
    current = n;
    renderSlide(current);
    if (isCenter) {
      broadcastState();
      if (!isPaused) startCountdown();
    }
  };
  const nextSlide = () => goTo(current + 1);
  const prevSlide = () => goTo(current - 1);

  const setPaused = (paused, broadcast) => {
    isPaused = !!paused;
    if (isPaused) {
      stopCountdown();
      pauseBtn.setAttribute('aria-pressed', 'true');
      pauseBtn.setAttribute('aria-label', 'Resume auto-advance');
      iconPause.style.display = 'none';
      iconPlay.style.display  = 'block';
      // Pause any playing video on the current slide (every role).
      const v = mediaEls[current];
      if (v && v.tagName === 'VIDEO') { try { v.pause(); } catch (_) {} }
      if (pauseResumeTimer) clearTimeout(pauseResumeTimer);
      // The auto-resume timer is center-only — satellites mirror state
      // via the broadcast that follows, so they don't need their own
      // timer (and shouldn't have one, to keep center authoritative).
      if (isCenter && pauseMs > 0) {
        pauseResumeTimer = setTimeout(() => setPaused(false, /*broadcast=*/true), pauseMs);
      }
    } else {
      pauseBtn.setAttribute('aria-pressed', 'false');
      pauseBtn.setAttribute('aria-label', 'Pause auto-advance');
      iconPause.style.display = 'block';
      iconPlay.style.display  = 'none';
      if (pauseResumeTimer) { clearTimeout(pauseResumeTimer); pauseResumeTimer = null; }
      // Resume current slide's video (if any).
      const v = mediaEls[current];
      if (v && v.tagName === 'VIDEO') {
        const p = v.play();
        if (p && p.catch) p.catch(() => {});
      }
      if (isCenter) startCountdown();
    }
    if (isCenter && broadcast) broadcastState();
    updateHud();
  };

  // ---- WebSocket client --------------------------------------------------
  // Auto-reconnect with backoff. The relay caches the last broadcast
  // message and replays it to new connects, so on (re)connect a
  // satellite immediately sees the current state.
  let ws = null;
  let wsReady = false;
  let wsRetryMs = 500;
  const WS_RETRY_MIN = 500;
  const WS_RETRY_MAX = 8000;
  const sendQueue = [];

  const send = (msg) => {
    const data = JSON.stringify(msg);
    if (wsReady && ws && ws.readyState === WebSocket.OPEN) {
      ws.send(data);
    } else {
      // Drop old state messages from the queue — the latest one supersedes.
      for (let i = sendQueue.length - 1; i >= 0; i--) {
        try {
          const m = JSON.parse(sendQueue[i]);
          if (m.type === 'state') sendQueue.splice(i, 1);
        } catch (_) {}
      }
      sendQueue.push(data);
    }
  };

  const connectWS = () => {
    try {
      ws = new WebSocket(wsUrl);
    } catch (e) {
      console.warn('[app3 ' + role + '] WS construct failed:', e);
      scheduleReconnect();
      return;
    }
    ws.onopen = () => {
      wsReady = true;
      wsRetryMs = WS_RETRY_MIN;
      while (sendQueue.length) ws.send(sendQueue.shift());
      // Center always re-broadcasts on (re)connect so it overwrites
      // any stale cached state in the relay.
      if (isCenter) broadcastState();
      updateHud();
    };
    ws.onmessage = (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        if (msg && msg.type === 'state') {
          // Center ignores incoming state (only it broadcasts state).
          // Otherwise on reconnect it would mirror its own old cached
          // state from before a crash + lose any in-flight changes.
          if (!isCenter) applyState(msg);
        }
      } catch (_) { /* not JSON; ignore */ }
    };
    ws.onclose = () => {
      wsReady = false;
      ws = null;
      scheduleReconnect();
      updateHud();
    };
    ws.onerror = () => { /* onclose follows; reconnect there */ };
  };

  const scheduleReconnect = () => {
    setTimeout(connectWS, wsRetryMs);
    wsRetryMs = Math.min(wsRetryMs * 2, WS_RETRY_MAX);
  };

  // ---- Center-only inputs ------------------------------------------------
  if (isCenter) {
    backBtn.addEventListener('pointerdown',  (e) => { e.stopPropagation(); prevSlide(); });
    nextBtn.addEventListener('pointerdown',  (e) => { e.stopPropagation(); nextSlide(); });
    pauseBtn.addEventListener('pointerdown', (e) => { e.stopPropagation(); setPaused(!isPaused, /*broadcast=*/true); });

    // Swipe — same parameters as App 1.
    const SWIPE_MAX_MS   = 600;
    const SWIPE_MIN_DIST = () => Math.max(60, window.innerWidth * 0.04);
    let swipeStart = null;
    stage.addEventListener('pointerdown', (e) => {
      swipeStart = { x: e.clientX, y: e.clientY, t: performance.now(), id: e.pointerId };
    });
    const endSwipe = (e) => {
      if (!swipeStart || (e.pointerId !== undefined && e.pointerId !== swipeStart.id)) return;
      const dx = e.clientX - swipeStart.x;
      const dy = e.clientY - swipeStart.y;
      const dt = performance.now() - swipeStart.t;
      swipeStart = null;
      if (dt > SWIPE_MAX_MS) return;
      const min = SWIPE_MIN_DIST();
      if (Math.abs(dx) < min || Math.abs(dx) < Math.abs(dy) * 1.2) return;
      if (dx < 0) nextSlide(); else prevSlide();
    };
    stage.addEventListener('pointerup',     endSwipe);
    stage.addEventListener('pointercancel', () => { swipeStart = null; });

    // Keep countdown accurate after the tab is backgrounded (matches App 1).
    document.addEventListener('visibilitychange', () => {
      if (document.hidden || isPaused) return;
      startCountdown();
    });
  }

  // Block context menu / select / drag globally on every role.
  document.addEventListener('contextmenu', (e) => e.preventDefault());
  document.addEventListener('selectstart', (e) => e.preventDefault());
  document.addEventListener('dragstart',   (e) => e.preventDefault());

  // ---- Debug HUD ---------------------------------------------------------
  const updateHud = () => {
    if (!cfg.debug) return;
    hud.innerHTML =
      '<b>app3 / ' + role + '</b><br>' +
      'slide: ' + (current + 1) + ' / ' + slides.length + '<br>' +
      'paused: ' + (isPaused ? 'yes' : 'no') + '<br>' +
      'ws: ' + (wsReady ? 'connected' : 'disconnected') + '<br>' +
      'last ts: ' + (lastAppliedTs || '—');
  };

  // ---- Boot --------------------------------------------------------------
  // Wait for fonts (pagination uses the body font; the wait is short)
  // and then render slide 0. Center starts the countdown + WS broadcast;
  // satellites just wait for incoming state. Both connect to WS on boot
  // so the relay's cached-last-message replay can kick in immediately.
  const finalizeBoot = () => {
    renderSlide(0);
    connectWS();
    if (isCenter) {
      broadcastState();
      startCountdown();
    }
    updateHud();
  };
  let booted = false;
  const boot = () => { if (booted) return; booted = true; requestAnimationFrame(finalizeBoot); };
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(boot);
  }
  // Safety net (same value as App 1) in case fonts never resolve.
  setTimeout(boot, 1500);
}());
</script>
</body>
</html>
